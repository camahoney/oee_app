<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Certificate of Completion - LOTO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .cert-container {
            width: 1100px;
            height: 850px;
            background: white;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            color: #0F172A;
            /* Print settings */
            page-break-after: always;
        }

        /* Geometric Blue Design */
        .shape-tl {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 300px 300px 0 0;
            border-color: #004aad transparent transparent transparent;
            z-index: 1;
        }

        .shape-tl-2 {
            position: absolute;
            top: -50px;
            left: -50px;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 400px 400px 0 0;
            border-color: rgba(0, 74, 173, 0.3) transparent transparent transparent;
            z-index: 0;
        }

        .shape-br {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 0 300px 300px;
            border-color: transparent transparent #004aad transparent;
            z-index: 1;
        }

        .shape-br-2 {
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 0 400px 400px;
            border-color: transparent transparent rgba(0, 74, 173, 0.3) transparent;
            z-index: 0;
        }

        /* Content Area */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
            z-index: 10;
        }

        .logo {
            position: absolute;
            top: 60px;
            right: 60px;
            text-align: right;
            z-index: 20;
        }

        .logo-box {
            font-size: 2rem;
            font-weight: 800;
            color: #0F172A;
            border: 3px solid #0F172A;
            padding: 5px 15px;
            display: inline-block;
        }

        .logo-text {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-top: 5px;
            color: #004aad;
            font-weight: 700;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 5rem;
            letter-spacing: 2px;
            margin: 0;
            color: #004aad;
            text-transform: uppercase;
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-top: 10px;
            text-transform: uppercase;
            color: #004aad;
        }

        .certifies-text {
            margin-top: 60px;
            font-size: 1.2rem;
            color: #64748B;
            font-style: italic;
        }

        .student-name {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin: 20px 0;
            color: #0F172A;
            border-bottom: 2px solid #e2e8f0;
            display: inline-block;
            min-width: 60%;
            padding-bottom: 10px;
        }

        .course-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0F172A;
            margin-bottom: 5px;
        }

        .course-detail {
            font-size: 1rem;
            color: #64748B;
            margin-bottom: 80px;
        }

        .signatures {
            display: flex;
            justify-content: space-between;
            width: 80%;
            margin: 0 auto;
        }

        .sig-block {
            text-align: center;
        }

        .sig-line {
            width: 250px;
            border-bottom: 1px solid #0F172A;
            margin-bottom: 10px;
            font-family: 'Playfair Display', cursive;
            font-size: 1.5rem;
            color: #0F172A;
        }

        .sig-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #64748B;
            letter-spacing: 1px;
        }

        @media print {
            body {
                background: none;
                -webkit-print-color-adjust: exact;
            }

            .cert-container {
                box-shadow: none;
                width: 100%;
                height: 100vh;
            }
        }
    </style>
</head>

<body>

    <div class="cert-container">
        <!-- Geometric Shapes -->
        <div class="shape-tl"></div>
        <div class="shape-tl-2"></div>
        <div class="shape-br"></div>
        <div class="shape-br-2"></div>

        <!-- Logo -->
        <div class="logo">
            <div class="logo-box">&#10003;</div>
            <div class="logo-text">VETTED SAFE</div>
        </div>

        <div class="content">
            <h1>Certificate</h1>
            <h2>Of Completion</h2>

            <p class="certifies-text">This certifies that</p>

            <div class="student-name" contenteditable="true">Student Name Here</div>

            <p class="certifies-text" style="margin-top: 10px;">has successfully completed the training course</p>

            <div class="course-title">Topic 02: Lockout / Tagout Awareness</div>
            <div class="course-detail">Category: Safety Core | Score: 100% | Date: <span contenteditable="true">January
                    17, 2026</span></div>

            <div class="signatures">
                <div class="sig-block">
                    <!-- Blank for them to sign -->
                    <div class="sig-line"></div>
                    <div class="sig-title">Instructor Signature</div>
                </div>
                <div class="sig-block">
                    <div class="sig-line" contenteditable="true"> Christopher Mahoney </div>
                    <div class="sig-title">Training Director</div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
